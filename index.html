<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动图切片生成器 | GIF Slicer & Generator</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./assets/lib/jszip.min.js"></script>
    <script src="./assets/lib/gif.js"></script>
</head>
<body>
    <div class="container">
        <a href="https://github.com/788009/gifslicer" target="_blank" class="github-link" title="访问 GitHub 仓库">
            <svg viewBox="0 0 16 16" width="28" height="28" aria-hidden="true">
                <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
        </a>
        <header>
            <h1>动图切片生成器</h1>
            <p>多图合成动图，支持自定义多端水平切割与批量下载</p>
        </header>

        <main>
            <div class="view-section active">
                <section class="card">
                    <h2>1. 上传图片源</h2>
                    <div class="file-upload-wrapper">
                        <input type="file" id="target-images" multiple accept="image/jpeg, image/png, image/webp">
                        <label for="target-images" class="upload-btn">选择多张图片</label>
                        <span id="target-images-info">未选择任何文件</span>
                    </div>
                </section>

                <section class="card">
                    <h2>2. 基础设置</h2>
                    <div class="form-group">
                        <label>选择基准尺寸图片：</label>
                        <select id="base-image-select">
                            <option value="">请先上传图片...</option>
                        </select>
                        <p class="hint-text" style="margin-bottom:0;">注：其余图片将以此图的尺寸为中心放大或缩小截取。</p>
                    </div>
                    <div class="form-group">
                        <label>帧率 (FPS)：</label>
                        <input type="number" id="fps-input" value="1" min="1" max="60">
                    </div>
                    
                    <div class="form-group" style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <div style="flex: 1; min-width: 150px;">
                            <label>色彩采样质量：</label>
                            <select id="quality-select">
                                <option value="1">1 - 极高画质 (体积庞大)</option>
                                <option value="10" selected>10 - 标准 (默认推荐)</option>
                                <option value="20">20 - 较低画质 (体积较小)</option>
                                <option value="30">30 - 极低画质 (体积极小)</option>
                            </select>
                        </div>
                        <div style="flex: 1; min-width: 150px;">
                            <label>输出尺寸缩放：</label>
                            <select id="scale-select">
                                <option value="1">100% (原图尺寸)</option>
                                <option value="0.75">75% (减小约 40% 体积)</option>
                                <option value="0.5" selected>50% (减小约 75% 体积)</option>
                                <option value="0.25">25% (适合预览/表情包)</option>
                            </select>
                        </div>
                    </div>
                    </section>
                </section>

                <section class="card">
                    <h2>3. 切割设置</h2>
                    <div class="mode-selector">
                        <input type="radio" name="slice-mode" value="even" id="mode-even" checked>
                        <label for="mode-even">平均切割</label>

                        <input type="radio" name="slice-mode" value="custom" id="mode-custom">
                        <label for="mode-custom">自定义水平线</label>
                    </div>

                    <div id="settings-even" class="settings-panel active">
                        <div class="form-group">
                            <label>等分切割份数：</label>
                            <input type="number" id="even-slices" value="3" min="1" max="100">
                        </div>
                    </div>

                    <div id="settings-custom" class="settings-panel">
                        <div class="form-group">
                            <label>自定义水平切割线：</label>
                            
                            <div id="custom-empty-state" style="padding: 20px; text-align: center; background: var(--bg-color); border-radius: 6px; border: 1px dashed var(--border-color); color: var(--text-muted);">
                                请先在上方上传图片
                            </div>

                            <div id="custom-workspace" style="display: none;">
                                <div style="margin-bottom: 10px; display: flex; gap: 10px;">
                                    <button id="add-line-btn" class="secondary-btn">添加切割线</button>
                                    <button id="remove-line-btn" class="secondary-btn">删除选中切割线</button>
                                </div>
                                <div id="editor-wrapper" class="editor-wrapper">
                                    <img id="editor-img" src="" alt="预览图" style="display: none;">
                                    <div id="lines-container"></div>
                                </div>
                                <p class="hint-text">提示：单击红线后调整切割位置。</p>
                            </div>
                            
                        </div>
                    </div>
                </section>

                <button id="generate-btn" class="primary-btn">生成动图切片</button>

                <div id="progress-wrapper" style="display: none; margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 5px; color: var(--text-muted);">
                        <span>生成进度</span>
                        <span id="progress-text">0%</span>
                    </div>
                    <div class="progress-container">
                        <div id="progress-bar" class="progress-bar"></div>
                    </div>
                </div>

                <section id="result-section" class="card" style="display: none;">
                    <div class="result-header">
                        <h2>4. 预览与下载</h2>
                        <button id="download-all-btn" class="secondary-btn">打包下载 ZIP</button>
                    </div>
                    <div id="preview-container" class="preview-grid"></div>
                </section>
            </div>
        </main>
        <footer style="text-align: center; margin-top: 40px; padding-bottom: 20px; color: var(--text-muted); font-size: 0.85em;">
            <span id="busuanzi_container_site_pv">
                本站总访问量 <span id="busuanzi_value_site_pv"></span> 次
            </span>
            <span style="margin: 0 10px;">|</span>
            <span id="busuanzi_container_site_uv">
                本站总访客数 <span id="busuanzi_value_site_uv"></span> 人
            </span>
        </footer>
    </div>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <script>
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(e.target.dataset.target).classList.add('active');
            });
        });
    </script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
